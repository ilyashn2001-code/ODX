<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Центр геоаналитических инструментов</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Центр геоаналитических инструментов</h1>

<div class="block">
<h2>1. Выбор инструмента</h2>
<select id="tool">
<option>Инструмент предиктивного анализа</option>
<option>Оценка покрытия территорий</option>
<option>Сценарное сопоставление</option>
</select>
</div>

<div class="block">
<h2>2. Наборы</h2>

<div>
<label>Анализируемый набор:</label>
<select id="mainSet">
<option value="odh">Набор ОДХ</option>
<option value="sok">Благоустройство СОК</option>
<option value="mr">Благоустройство МР</option>
</select>
</div>

<div>
<label>Сравниваемые:</label>
<div id="compareSets"></div>
</div>
</div>

<div class="block">
<h2>3. Фильтры</h2>
<label><input type="checkbox" id="noFilter"> Без фильтрации</label>
<div id="filters"></div>
<button onclick="addRow()">Добавить условие</button>
</div>

<div class="block">
<h2>4. Приоритизация</h2>
<button onclick="addPriority()">Добавить правило</button>
<div id="priority"></div>
</div>

<div class="block">
<h2>5. Результат</h2>
<div id="map">[карта]</div>
<table id="result"></table>
</div>

<script src="app.js"></script>
</body>
</html>
